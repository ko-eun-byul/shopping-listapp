<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span { font-size: 1.6rem; }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row input {
      flex: 1;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      color: #2d3748;
    }

    .input-row input:focus { border-color: #667eea; }

    .input-row input::placeholder { color: #a0aec0; }

    .btn-add {
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-add:hover { background: #5a67d8; }
    .btn-add:active { transform: scale(0.97); }

    .stats {
      font-size: 0.82rem;
      color: #718096;
      margin-bottom: 14px;
    }

    .stats strong { color: #4a5568; }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      transition: opacity 0.2s, background 0.2s;
    }

    li.checked {
      background: #edf7ed;
      border-color: #c6f6d5;
      opacity: 0.7;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #48bb78;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-name {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      word-break: break-all;
      transition: color 0.2s;
    }

    li.checked .item-name {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e0;
      font-size: 1.1rem;
      padding: 2px 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover { color: #e53e3e; background: #fff5f5; }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .btn-clear {
      margin-top: 20px;
      width: 100%;
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 9px;
      color: #a0aec0;
      font-size: 0.85rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .btn-clear:hover { color: #e53e3e; border-color: #fed7d7; }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1><span>🛒</span> 쇼핑리스트</h1>

    <div class="input-row">
      <label for="itemInput" class="hidden">아이템 이름</label>
      <input id="itemInput" type="text" placeholder="아이템을 입력하세요" maxlength="60" aria-label="아이템 이름" />
      <button class="btn-add" id="btnAdd">추가</button>
    </div>

    <div class="stats" id="stats"></div>

    <ul id="list"></ul>

    <p class="empty hidden" id="empty">아직 아이템이 없어요. 위에서 추가해보세요!</p>

    <button class="btn-clear hidden" id="clearBtn">
      완료된 항목 삭제
    </button>
  </div>

  <script>
    function loadItems() {
      try {
        return JSON.parse(localStorage.getItem('shoppingItems') || '[]');
      } catch {
        return [];
      }
    }

    function save() {
      try {
        localStorage.setItem('shoppingItems', JSON.stringify(items));
      } catch (e) {
        if (e instanceof DOMException && e.name === 'QuotaExceededError') {
          alert('저장 공간이 부족합니다. 완료된 항목을 삭제해주세요.');
        }
      }
    }

    let items = loadItems();

    const listEl   = document.getElementById('list');
    const emptyEl  = document.getElementById('empty');
    const statsEl  = document.getElementById('stats');
    const clearBtn = document.getElementById('clearBtn');

    function render() {
      listEl.innerHTML = '';

      if (items.length === 0) {
        emptyEl.classList.remove('hidden');
        statsEl.textContent = '';
        clearBtn.classList.add('hidden');
        return;
      }

      emptyEl.classList.add('hidden');
      const checkedCount = items.filter(i => i.checked).length;
      statsEl.innerHTML = `총 <strong>${items.length}</strong>개 · 완료 <strong>${checkedCount}</strong>개`;
      clearBtn.classList.toggle('hidden', checkedCount === 0);

      items.forEach((item) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.checked;
        cb.setAttribute('aria-label', `${item.name} 완료 여부`);
        cb.addEventListener('change', () => toggleItem(item.id));

        const span = document.createElement('span');
        span.className = 'item-name';
        span.textContent = item.name;

        const del = document.createElement('button');
        del.className = 'btn-delete';
        del.title = '삭제';
        del.setAttribute('aria-label', `${item.name} 삭제`);
        del.textContent = '✕';
        del.addEventListener('click', () => deleteItem(item.id));

        li.appendChild(cb);
        li.appendChild(span);
        li.appendChild(del);
        listEl.appendChild(li);
      });
    }

    function addItem() {
      const input = document.getElementById('itemInput');
      const name = input.value.trim();
      if (!name) { input.focus(); return; }
      items.push({ id: crypto.randomUUID(), name, checked: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (item) item.checked = !item.checked;
      save();
      render();
    }

    function deleteItem(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    document.getElementById('btnAdd').addEventListener('click', addItem);
    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });
    clearBtn.addEventListener('click', clearChecked);

    render();
  </script>
</body>
</html>
